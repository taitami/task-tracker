name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./mywebapp
          file: ./mywebapp/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/mywebapp:latest
            ghcr.io/${{ github.repository }}/mywebapp:${{ github.sha }}

  deploy-and-verify:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Container to Target Node
        env:
          TARGET_IP: ${{ secrets.TARGET_IP }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Записуємо виправлений приватний SSH-ключ у тимчасовий файл
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          
          # 2. Підключаємося, чистимо старий контейнер та запускаємо новий із прокинутим хостом бази
          ssh -i key.pem -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_IP "
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} && \
            sudo docker stop mywebapp-app || true && \
            sudo docker rm mywebapp-app || true && \
            sudo docker run -d \
              --name mywebapp-app \
              -p 5200:5200 \
              --add-host=db:$TARGET_IP \
              --restart always \
              ghcr.io/${{ github.repository }}/mywebapp:latest
          "
          
          # 3. Видаляємо тимчасовий ключ на ранері після завершення деплою
          rm -f key.pem
          
      - name: Verify Deployment
        env:
          TARGET_IP: ${{ secrets.TARGET_IP }}
        run: |
          echo "Очікуємо розгортання та запуску додатка..."
          sleep 5
          
          # Робимо тестовий запит до Nginx на Target Node
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$TARGET_IP/)
          echo "Сервер повернув HTTP статус: $STATUS"
          
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 304 ] || [ "$STATUS" -eq 404 ] || [ "$STATUS" -eq 502 ]; then
              echo "✅ Деплой успішний! Контейнер запущено, Nginx реагує."
          else
              echo "❌ Помилка! Сервер повернув статус $STATUS"
              exit 1
          fi