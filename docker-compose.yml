services:
  db:
    image: mariadb:lts
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mywebapp_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mywebapp_net

  webapp:
    build:
      context: ./mywebapp
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    networks:
      - mywebapp_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - mywebapp_net

networks:
  mywebapp_net:
    driver: bridge

volumes:
  db_data: