version: '3.8'

services:
  db:
    image: mariadb:lts
    container_name: mywebapp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mywebapp_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mywebapp_net

  webapp:
    build:
      context: ./mywebapp
      dockerfile: Dockerfile
    container_name: mywebapp-app
    restart: always
    environment:
      - PORT=5200
      - DB_HOST=db
      - DB_USER=app
      - DB_PASS=app_password
      - DB_NAME=mywebapp_db
    depends_on:
      - db
    ports:
      - "5200:5200"
    networks:
      - mywebapp_net

  nginx:
    image: nginx:alpine
    container_name: mywebapp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - mywebapp_net

networks:
  mywebapp_net:
    driver: bridge

volumes:
  db_data: